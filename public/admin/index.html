<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager — Screen Story Co.</title>

  <!-- Fonts: Oswald + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --void: #0a0a0a;
      --ivory: #f4efe6;
      --smoke: #6b6560;
      --accent: #b85c50;
      --accent-deep: #8a3f35;
      --card: #1a1918;
      --card-raised: #222120;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--void);
      color: var(--ivory);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .cms-brand {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ivory);
      margin-bottom: 0.5rem;
    }
    .cms-sub {
      color: var(--smoke);
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    .login-box {
      background: var(--card);
      border: 1px solid rgba(107,101,96,0.2);
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: var(--ivory);
      border: none;
      padding: 0.9rem 1.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--accent-deep); }
    .loading {
      color: var(--smoke);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .error {
      color: var(--accent);
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    /* Decap overrides */
    .nc-root { --backgroundColor: var(--void) !important; }
    .nc-editor { background: var(--card) !important; }
    .nc-sidebar { background: var(--card) !important; border-right: 1px solid rgba(107,101,96,0.15) !important; }
    .nc-sidebar-header { background: var(--card-raised) !important; }
    .nc-sidebar-list-item { color: var(--ivory) !important; }
    .nc-sidebar-list-item:hover { background: rgba(184,92,80,0.1) !important; }
    .nc-card { background: var(--card) !important; border-color: rgba(107,101,96,0.15) !important; }
    .nc-field label { color: var(--ivory) !important; }
    .nc-field input, .nc-field textarea, .nc-field select { background: var(--card-raised) !important; color: var(--ivory) !important; border-color: rgba(107,101,96,0.2) !important; }
    .nc-field input:focus, .nc-field textarea:focus, .nc-field select:focus { border-color: var(--accent) !important; outline: none !important; }
    .nc-button { background: var(--accent) !important; color: var(--ivory) !important; border: none !important; }
    .nc-button:hover { background: var(--accent-deep) !important; }
    .nc-dropdown-list { background: var(--card) !important; }
    .nc-dropdown-item { color: var(--ivory) !important; }
    .nc-dropdown-item:hover { background: rgba(184,92,80,0.1) !important; }
  </style>
</head>
<body>

  <!-- Clerk Sign-In button (shown when not authenticated) -->
  <div id="login-panel" class="login-box">
    <div class="cms-brand">Screen Story Co.</div>
    <div class="cms-sub">Content Manager</div>
    <div id="clerk-sign-in"></div>
    <p id="loading-msg" class="loading" style="display:none;">Authenticating...</p>
    <p id="error-msg" class="error"></p>
  </div>

  <!-- Decap CMS mounts here once authenticated -->
  <div id="nc-root" style="display:none;"></div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Clerk JS for authentication -->
  <script async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_c3VyZS1zcXVpZC02Ny5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://sure-squid-67.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript">
  </script>

  <script>
    window.addEventListener('load', async function () {
      const loading = document.getElementById('loading-msg');
      const error   = document.getElementById('error-msg');
      const login   = document.getElementById('login-panel');
      const cmsRoot = document.getElementById('nc-root');
      const signInContainer = document.getElementById('clerk-sign-in');

      // Wait for Clerk to load
      await Clerk.load();

      if (Clerk.user) {
        // User is already signed in
        const sessionToken = await Clerk.session.getToken();
        if (!sessionToken) {
          error.textContent = 'Could not get session token. Please sign in again.';
          return;
        }

        loading.style.display = 'block';
        login.style.display   = 'none';
        cmsRoot.style.display = 'block';

        // Configure Decap CMS with git-gateway
        CMS.init({
          config: {
            backend: {
              name: 'git-gateway',
              branch: 'main',
              identity_url: '/api/decap/identity',
              gateway_url: '/api/decap/git-gateway',
              token: sessionToken,
            },
            publish_mode: 'editorial_workflow',
            media_folder: 'public/assets',
            public_folder: '/assets',
            collections: [
              {
                name: 'pages', label: 'Pages', folder: 'src/content/pages',
                create: false, delete: false,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Body', name: 'body', widget: 'markdown' },
                ]
              },
              {
                name: 'projects', label: 'Projects', folder: 'src/content/projects',
                create: true, delete: true,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Category', name: 'category', widget: 'select', options: ['Brand Films','Commercial','Documentary','Music Video','Corporate'] },
                  { label: 'Client', name: 'client', widget: 'string', required: false },
                  { label: 'Featured Image', name: 'featured_image', widget: 'image', required: false },
                  { label: 'Video URL', name: 'video_url', widget: 'string', required: false },
                  { label: 'Description', name: 'description', widget: 'markdown' },
                  { label: 'Year', name: 'year', widget: 'number', required: false },
                  { label: 'Tags', name: 'tags', widget: 'list', required: false },
                  { label: 'Published', name: 'published', widget: 'boolean', default: true },
                ]
              },
              {
                name: 'services', label: 'Services', folder: 'src/content/services',
                create: true, delete: true,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Description', name: 'description', widget: 'markdown' },
                  { label: 'Icon', name: 'icon', widget: 'string', required: false },
                  { label: 'Order', name: 'order', widget: 'number', required: false },
                ]
              },
              {
                name: 'blog', label: 'Blog', folder: 'src/content/blog',
                create: true, delete: true,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Publish Date', name: 'date', widget: 'datetime' },
                  { label: 'Author', name: 'author', widget: 'string' },
                  { label: 'Featured Image', name: 'featured_image', widget: 'image', required: false },
                  { label: 'Excerpt', name: 'excerpt', widget: 'text' },
                  { label: 'Body', name: 'body', widget: 'markdown' },
                ]
              },
              {
                name: 'testimonials', label: 'Testimonials', folder: 'src/content/testimonials',
                create: true, delete: true,
                fields: [
                  { label: 'Client Name', name: 'client_name', widget: 'string' },
                  { label: 'Client Role', name: 'client_role', widget: 'string', required: false },
                  { label: 'Quote', name: 'quote', widget: 'text' },
                  { label: 'Project', name: 'project', widget: 'string', required: false },
                ]
              },
            ]
          }
        });
      } else {
        // Show Clerk sign-in component
        Clerk.mountSignIn(signInContainer, {
          afterSignInUrl: window.location.href,
          appearance: {
            variables: {
              colorPrimary: '#b85c50',
              colorBackground: '#1a1918',
              colorText: '#f4efe6',
              colorTextSecondary: '#6b6560',
              borderRadius: '6px',
            },
          },
        });
      }
    });
  </script>

</body>
</html>
